<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>VoidRoom</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">  <style>  
  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
}  
  
body{  
    background:#050505;  
    color:#00ff88;  
    font-family:"JetBrains Mono", monospace;  
    overflow:hidden;  
}  
  
/* MATRIX BACKGROUND */  
  
canvas{  
    position:fixed;  
    top:0;  
    left:0;  
    width:100%;  
    height:100%;  
    z-index:-1;  
    opacity:0.18;  
}  
  
/* MAIN UI */  
  
.container{  
    width:95%;  
    max-width:1000px;  
    height:95vh;  
    margin:auto;  
    margin-top:2.5vh;  
  
    border:1px solid #1a1a1a;  
    background:rgba(0,0,0,0.78);  
  
    backdrop-filter:blur(4px);  
  
    display:flex;  
    flex-direction:column;  
  
    box-shadow:  
    0 0 25px rgba(0,255,120,0.08);  
}  
  
/* HEADER */  
  
.header{  
    padding:18px;  
    border-bottom:1px solid #1b1b1b;  
  
    display:flex;  
    justify-content:space-between;  
    align-items:center;  
}  
  
.logo{  
    font-size:24px;  
    font-weight:700;  
    letter-spacing:2px;  
}  
  
.online{  
    color:#aaaaaa;  
    font-size:14px;  
}  
  
/* CHAT */  
  
.chat{  
    flex:1;  
    overflow-y:auto;  
  
    padding:20px;  
}  
  
.message{  
    margin-bottom:14px;  
    animation:fade 0.25s linear;  
}  
  
.message .name{  
    color:#00ffaa;  
    font-weight:bold;  
}  
  
.message .time{  
    color:#666;  
    font-size:12px;  
}  
  
.message .text{  
    margin-top:3px;  
    color:#e0e0e0;  
    word-wrap:break-word;  
}  
  
.system{  
    color:#ff5555;  
    margin-bottom:12px;  
    font-size:13px;  
}  
  
@keyframes fade{  
    from{  
        opacity:0;  
        transform:translateY(8px);  
    }  
  
    to{  
        opacity:1;  
        transform:translateY(0px);  
    }  
}  
  
/* INPUT AREA */  
  
.inputArea{  
    border-top:1px solid #1a1a1a;  
    display:flex;  
    gap:10px;  
    padding:15px;  
}  
  
input{  
    background:#0f0f0f;  
    border:1px solid #222;  
    color:white;  
    padding:14px;  
  
    font-family:inherit;  
    outline:none;  
}  
  
#username{  
    width:180px;  
}  
  
#messageInput{  
    flex:1;  
}  
  
button{  
    background:#00aa66;  
    border:none;  
    color:white;  
  
    padding:14px 18px;  
  
    cursor:pointer;  
  
    font-family:inherit;  
    transition:0.2s;  
}  
  
button:hover{  
    background:#00cc77;  
}  
  
/* SCROLLBAR */  
  
.chat::-webkit-scrollbar{  
    width:8px;  
}  
  
.chat::-webkit-scrollbar-thumb{  
    background:#00aa66;  
}  
  
/* MOBILE */  
  
@media(max-width:700px){  
  
    .inputArea{  
        flex-direction:column;  
    }  
  
    #username{  
        width:100%;  
    }  
  
}  
  
</style>  </head>  
<body>  <canvas id="matrix"></canvas>

<div class="container">  <div class="header">  
    <div class="logo">  
        VOIDROOM  
    </div>  

    <div class="online" id="onlineCount">  
        ONLINE: 0 
    </div>  
</div>  

<div class="chat" id="chat"></div>  

<div class="inputArea">  

    <input  
    type="text"  
    id="username"  
    placeholder="nickname">  

    <input  
    type="text"  
    id="messageInput"  
    placeholder="type message...">  

    <button onclick="sendMessage()">  
        SEND  
    </button>  

</div>

</div>  <script type="module">  
  
/* =========================  
   FIREBASE IMPORTS  
========================= */  
  
import { initializeApp }  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
  
import {  
  
    getFirestore,  
    collection,  
    addDoc,  
    onSnapshot,  
    query,  
    orderBy,  
    serverTimestamp,  
    doc,  
    setDoc,  
    deleteDoc,  
    getDocs  
  
}  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";  
  
  
/* =========================  
   FIREBASE CONFIG  
========================= */  
  
const firebaseConfig = {  
  apiKey: "AIzaSyC7wse9OXr7XNngpS0ymAkBHa5u3hqn9vc",  
  authDomain: "cerac-terminal.firebaseapp.com",  
  projectId: "cerac-terminal",  
  storageBucket: "cerac-terminal.appspot.com",  
  messagingSenderId: "141584321783",  
  appId: "1:141584321783:web:a06f4147d64f87e9db97f2"  
};  
  
const app = initializeApp(firebaseConfig);  
  
const db = getFirestore(app);  
  
  
/* =========================  
   USER DATA  
========================= */  
  
const usernameInput =  
document.getElementById("username");  
  
const savedName =  
localStorage.getItem("void_username");  
  
if(savedName){  
    usernameInput.value = savedName;  
}  
  
let userId =  
Math.random().toString(36).substring(2,10);  
  
const onlineRef =  
doc(db, "onlineUsers", userId);  
  
  
/* =========================  
   ONLINE USERS  
========================= */  
  
async function setOnline(){
    await setDoc(onlineRef, {
        online: true,
        lastSeen: Date.now()
    });
}
  
setOnline();  

setInterval(async () => {
    await setDoc(onlineRef, {
        online: true,
        lastSeen: Date.now()
    });
}, 10000);
  
window.addEventListener("beforeunload", async ()=>{  
  
    await deleteDoc(onlineRef);  
  
});  
  
/* REALTIME ONLINE COUNT */  
  
onSnapshot(collection(db, "onlineUsers"), (snapshot) => {
    const now = Date.now();
    let active = 0;

    snapshot.forEach((doc) => {
        const data = doc.data();
        if (now - data.lastSeen < 20000) {
            active++;
        }
    });

    document.getElementById("onlineCount").textContent =
        `ONLINE: ${active}`;
});
  
/* =========================  
   CHAT SYSTEM  
========================= */  
  
const chat =  
document.getElementById("chat");  
  
const messagesRef =  
collection(db, "messages");  
  
const q =  
query(messagesRef, orderBy("created"));  
  
function addSystemMessage(text){  
  
    const div =  
    document.createElement("div");  
  
    div.className = "system";  
  
    div.textContent = text;  
  
    chat.appendChild(div);  
  
    chat.scrollTop =  
    chat.scrollHeight;  
}  
  
addSystemMessage(  
"[ CONNECTED TO VOIDROOM ]"  
);  
  
/* REALTIME MESSAGE LISTENER */  
  
onSnapshot(q, (snapshot)=>{  
  
    chat.innerHTML = "";  
  
    addSystemMessage(  
    "[ SECURE CHANNEL ACTIVE ]"  
    );  
  
    snapshot.forEach((doc)=>{  
  
        const data = doc.data();  
  
        const wrapper =  
        document.createElement("div");  
  
        wrapper.className = "message";  
  
        const time =  
        data.created?.seconds  
  
        ? new Date(  
            data.created.seconds * 1000  
          ).toLocaleTimeString()  
  
        : "loading";  
  
        wrapper.innerHTML = `  
  
        <div class="name">  
        ${escapeHTML(data.user)}  
        <span class="time">  
        ${time}  
        </span>  
        </div>  
  
        <div class="text">  
        ${escapeHTML(data.text)}  
        </div>  
  
        `;  
  
        chat.appendChild(wrapper);  
  
    });  
  
    chat.scrollTop =  
    chat.scrollHeight;  
  
});  
  
  
/* =========================  
   SEND MESSAGE  
========================= */  
  
window.sendMessage =  
async function(){  
  
    const username =  
    usernameInput.value.trim();  
  
    const messageInput =  
    document.getElementById(  
    "messageInput"  
    );  
  
    const text =  
    messageInput.value.trim();  
  
    if(!username){  
  
        alert("Enter nickname.");  
  
        return;  
    }  
  
    if(!text) return;  
  
    localStorage.setItem(  
        "void_username",  
        username  
    );  
  
    /* COMMANDS */  
  
    if(text === "/clear"){  
  
        chat.innerHTML = "";  
  
        addSystemMessage(  
        "[ LOCAL TERMINAL CLEARED ]"  
        );  
  
        messageInput.value = "";  
  
        return;  
    }  
  
    /* LIMIT MESSAGE LENGTH */  
  
    if(text.length > 300){  
  
        alert("Message too long.");  
  
        return;  
    }  
  
    await addDoc(messagesRef, {  
  
        user:username,  
  
        text:text,  
  
        created:serverTimestamp()  
  
    });  
  
    messageInput.value = "";  
};  
  
  
/* =========================  
   ENTER TO SEND  
========================= */  
  
document  
.getElementById("messageInput")  
  
.addEventListener("keydown",  
  
(e)=>{  
  
    if(e.key === "Enter"){  
  
        sendMessage();  
  
    }  
  
});  
  
  
/* =========================  
   ESCAPE HTML  
========================= */  
  
function escapeHTML(str){  
  
    return str  
    .replace(/&/g, "&amp;")  
    .replace(/</g, "&lt;")  
    .replace(/>/g, "&gt;");  
}  
  
  
/* =========================  
   MATRIX BACKGROUND  
========================= */  
  
const canvas =  
document.getElementById("matrix");  
  
const ctx =  
canvas.getContext("2d");  
  
canvas.width =  
window.innerWidth;  
  
canvas.height =  
window.innerHeight;  
  
const letters =  
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";  
  
const fontSize = 14;  
  
const columns =  
canvas.width / fontSize;  
  
const drops = [];  
  
for(let i = 0; i < columns; i++){  
  
    drops[i] = 1;  
}  
  
function drawMatrix(){  
  
    ctx.fillStyle =  
    "rgba(0,0,0,0.06)";  
  
    ctx.fillRect(  
        0,  
        0,  
        canvas.width,  
        canvas.height  
    );  
  
    ctx.fillStyle =  
    "#00ff88";  
  
    ctx.font =  
    fontSize + "px monospace";  
  
    for(let i = 0; i < drops.length; i++){  
  
        const text =  
        letters[  
        Math.floor(  
        Math.random() *  
        letters.length  
        )];  
  
        ctx.fillText(  
            text,  
            i * fontSize,  
            drops[i] * fontSize  
        );  
  
        if(  
            drops[i] * fontSize >  
            canvas.height &&  
            Math.random() > 0.975  
        ){  
  
            drops[i] = 0;  
        }  
  
        drops[i]++;  
    }  
}  
  
setInterval(drawMatrix, 35);  
  
window.addEventListener("resize", ()=>{  
  
    canvas.width =  
    window.innerWidth;  
  
    canvas.height =  
    window.innerHeight;  
  
});  
  
</script>  </body>  
</html>
